name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o work ./cmd/work

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test -race ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | grep total

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: if [ -n "$(gofmt -l .)" ]; then echo "files need formatting:"; gofmt -l .; exit 1; fi

  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/work
      - run: GOOS=darwin GOARCH=amd64 go build -o /dev/null ./cmd/work
      - run: GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/work
      - run: GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/work
